server:
  port: 2333
  address: 0.0.0.0

plugins:
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: false
      applemusic: false
      deezer: false
      flowerytts: false
      yandexmusic: false
      vkmusic: false
    spotify:
      clientId: "982f7c66273a4c759c0a7e83a6fdbc37"
      clientSecret: "c3534dc023084dfeb25eff6215ff9374"

lavalink:
  plugins:
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.0"
      repository: "https://maven.lavalink.dev/releases"

  server:
    password: "fahad123"

    # -----------------------------
    # SOURCES CONFIG (IMPORTANT)
    # -----------------------------
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: false
      vimeo: false
      http: true
      local: false

    # -----------------------------
    # AUDIO FILTERS (optional but recommended)
    # -----------------------------
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      rotation: true
      distortion: true
      channelMix: true
      lowPass: true

    # -----------------------------
    # FRAME HANDLING
    # -----------------------------
    frameBufferDurationMs: 5000

    opusEncodingQuality: 10

    resamplingQuality: LOW

    trackStuckThresholdMs: 10000
    useSeekGhosting: true

    # -----------------------------
    # PLAYER BEHAVIOR
    # -----------------------------
    youtubePlaylistLoadLimit: 0

    playerUpdateInterval: 5

logging:
  level:
    root: INFO
    lavalink: INFO
